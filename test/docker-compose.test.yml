include:
  - path: ../docker-compose.yml

services:
  backend:
    environment:
      - LLM_MOCK=true

  playwright:
    image: mcr.microsoft.com/playwright:v1.52.0-noble
    working_dir: /tests
    volumes:
      - ./:/tests
    environment:
      - BASE_URL=http://frontend:3000
      - CI=true
    depends_on:
      frontend:
        condition: service_started
    command: npx playwright test --project=chromium
